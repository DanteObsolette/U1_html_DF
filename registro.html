<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Club Deportivo Pro</title>
    
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="page-register">

    <header>
        <a href="landing.html"><img src="logo.PNG.png" alt="SportClub logo"></a>
        <nav>
            <a href="landing.html">Inicio</a>
            <a href="#">Planes</a>
            <a href="#">Reservas</a>
        </nav>
    </header>

    <main>
        <section id="registro">
            <h2>Registro de Usuario</h2>
            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                <label for="confirm_password">Confirmar Contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirma tu contraseña" required>
                <button type="submit">Registrarse</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Club Deportivo</p>
    </footer>

</body>
</html>
