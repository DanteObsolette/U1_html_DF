<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - Club Deportivo Pro</title>
    
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="page-recover">

    <header>
        <a href="index.html"><img src="logo.PNG.png" alt="SportClub logo"></a>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="#">Planes</a>
            <a href="#">Reservas</a>
        </nav>
    </header>

    <main>
        <section id="recuperar">
            <h2>Recuperar Contraseña</h2>
            <form id="recoveryForm">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
                <button type="button" id="recoveryButton">Recuperar</button>
            </form>
            <div id="message" style="display: none;">
                <p>Enlace de recuperación enviado a su correo</p>
                <button onclick="window.location.href='login.html'">Volver al Login</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Club Deportivo</p>
    </footer>

    <script>
        document.getElementById('recoveryButton').addEventListener('click', function() {
            const email = document.getElementById('email').value;
            
            if (email) {
                document.getElementById('recoveryForm').style.display = 'none';
                document.getElementById('message').style.display = 'block';
            } else {
                alert('Por favor ingresa tu correo electrónico.');
            }
        });
    </script>

</body>
</html>
