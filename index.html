<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Club Deportivo</title>
    
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="page-login">

    <header>
        <a href="index.html"><img src="logo.PNG.png" alt="SportClub logo"></a>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Planes</a>
            <a href="#">Reservas</a>
        </nav>
    </header>

    <main>
        <section id="login">
            <h2>Iniciar Sesión</h2>
            <form>
                <label for="email">Correo:</label>
                <input type="email" id="email" name="email" required>
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" required>
                <button type="submit">Ingresar</button>
            </form>
            <p><a href="recuperar.html">Recuperar contraseña</a></p>
            <p><a href="registro.html">Registrarse</a></p>
            <div class="dashboard-links">
                <a class="dashboard-button" href="usuario.html">Usuario</a>
                <a class="dashboard-button" href="entrenador.html">Entrenador</a>
                <a class="dashboard-button" href="administrador.html">Administrador</a>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Club Deportivo</p>
    </footer>

</body>
</html>
